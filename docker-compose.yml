services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mydb

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - postgres

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend

    ports:
      - "5173:80"

    env_file:
      - ./frontend/.env

    depends_on:
      - backend

volumes:
  postgres-data: